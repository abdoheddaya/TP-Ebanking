<div class="row justify-content-center mt-5">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-4"><i class="bi bi-bank me-2"></i>E-BANK</h4>

      @if (errorMessage) {
        <div class="aler alert-danger">
          <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>
            <input
              type="text"
              class="form-control"
              formControlName="username"
              placeholder="Enter username"
              [class.is-invalid]="
                loginForm.get('username')?.invalid && loginForm.get('username')?.touched
              "
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>
            <input
              type="password"
              class="form-control"
              formControlName="password"
              placeholder="Enter password"
              [class.is-invalid]="
                loginForm.get('password')?.invalid && loginForm.get('password')?.touched
              "
            />
          </div>
        </div>

        <button class="btn btn-dark w-100" type="submit" [disabled]="loginForm.invalid || loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Login
        </button>
      </form>
    </div>
  </div>
</div>
